<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Claude Watchdog</title>
<link rel="icon" type="image/png" href="/static/favicon.png">
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="header">
  <h1><span style="color:#555">root@local:</span><span style="color:#00ff41">~</span><span style="color:#555">$</span> CLAUDE_WATCHDOG</h1>
  <div class="stats" id="stats"></div>
  <div class="refresh-info">
    <button onclick="doRefresh()">Refresh</button>
  </div>
</div>
<div class="container">
  <div class="col col-list">
    <div class="session-list" id="session-list"></div>
  </div>
  <div class="col col-detail">
    <div class="detail" id="detail">
      <div class="detail-empty">Select a session to view details</div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script src="/static/app.js"></script>
</body>
</html>
